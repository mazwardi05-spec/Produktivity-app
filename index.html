<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Personal OS</title>
<meta name="theme-color" content="#a0896b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Personal%20OS%22,%22short_name%22:%22PersonalOS%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5f0e8%22,%22theme_color%22:%22%23a0896b%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%20512%20512'%3E%3Crect%20width%3D'512'%20height%3D'512'%20rx%3D'80'%20fill%3D'%23a0896b'/%3E%3Ctext%20x%3D'256'%20y%3D'340'%20font-size%3D'260'%20text-anchor%3D'middle'%20fill%3D'white'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}"/>
<script>
if('serviceWorker' in navigator){
  const sw=`const C='pos-v1';const A=[location.href];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});`;
  const b=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{
  wood:'#a0896b','wood-light':'#c4a882','wood-dark':'#7d6a52',
  cream:'#f5f0e8','cream-dark':'#ede6d6','parchment:':#e8dfd0',
  ink:'#2c2825','ink-light':'#5a5248','ink-muted':'#8c8480',
  moss:'#6b7c5c','moss-light':'#8fa07a',
  clay:'#b5714a','clay-light':'#d4906a',
  sage:'#7a8f7e','ash':'#b8b0a8'
},fontFamily:{sans:['system-ui','-apple-system','sans-serif']}}}}
</script>
<style>
:root{--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#f5f0e8;color:#2c2825;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100dvh;}
/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#c4a882;border-radius:99px;}
/* Transitions */
.slide-up{animation:slideUp .28s cubic-bezier(.4,0,.2,1);}
.fade-in{animation:fadeIn .2s ease;}
.scale-in{animation:scaleIn .22s cubic-bezier(.4,0,.2,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
/* Fullscreen overlay */
.fs-overlay{position:fixed;inset:0;z-index:50;background:#f5f0e8;overflow:hidden;display:flex;flex-direction:column;}
.fs-overlay.hidden{display:none!important;}
/* Sidebar */
#sidebar{width:220px;flex-shrink:0;}
/* Bottom nav */
#bottom-nav{padding-bottom:calc(.75rem + var(--safe-bot,0px));}
/* Focus mode editor */
#editor-area{resize:none;background:transparent;outline:none;line-height:1.85;font-size:1rem;}
/* Task priority dots */
.dot-high{background:#b5714a;} .dot-med{background:#a0896b;} .dot-low{background:#7a8f7e;}
/* Checkbox custom */
.cb{width:18px;height:18px;border:1.5px solid #c4a882;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cb.checked{background:#a0896b;border-color:#a0896b;}
/* Folder card */
.folder-card{transition:transform .15s,box-shadow .15s;}
.folder-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(160,137,107,.18);}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(44,40,37,.45);z-index:80;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.modal-bg{align-items:center;}}
.modal-box{background:#f5f0e8;border-radius:1.25rem 1.25rem 0 0;width:100%;max-width:520px;padding:1.75rem;padding-bottom:calc(1.75rem + var(--safe-bot,0px));max-height:90vh;overflow-y:auto;}
@media(min-width:640px){.modal-box{border-radius:1.25rem;padding-bottom:1.75rem;}}
/* Input */
.inp{width:100%;border:1.5px solid #ded8cc;border-radius:.65rem;padding:.6rem .85rem;background:#faf7f2;color:#2c2825;font-size:.875rem;outline:none;transition:border .15s;}
.inp:focus{border-color:#a0896b;}
/* Btn */
.btn-wood{background:#a0896b;color:#faf7f2;border:none;border-radius:.65rem;padding:.6rem 1.25rem;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .15s;}
.btn-wood:hover{background:#8a7560;}
.btn-ghost{background:transparent;border:1.5px solid #c4a882;border-radius:.65rem;padding:.55rem 1rem;font-size:.875rem;color:#5a5248;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{background:#ede6d6;}
/* Nav active */
.nav-active{color:#a0896b!important;}
.nav-active .nav-dot{opacity:1!important;}
/* Tag */
.tag-high{background:#f5ede6;color:#b5714a;border:1px solid #e8c9b4;}
.tag-med{background:#f0ece4;color:#7d6a52;border:1px solid #d4c4aa;}
.tag-low{background:#eef1ec;color:#6b7c5c;border:1px solid #b8c8b4;}
/* Rich text toolbar */
.rte-btn{background:transparent;border:1px solid #ded8cc;border-radius:.4rem;padding:.2rem .5rem;font-size:.8rem;cursor:pointer;color:#5a5248;}
.rte-btn:hover{background:#ede6d6;}
[contenteditable]{outline:none;line-height:1.85;}
/* Notification toast */
.n-toast{position:fixed;top:calc(1rem + var(--safe-top,0px));right:1rem;z-index:200;background:#2c2825;color:#f5f0e8;padding:.75rem 1.1rem;border-radius:.85rem;font-size:.8rem;max-width:300px;box-shadow:0 4px 20px rgba(44,40,37,.3);animation:slideUp .3s ease;border-left:3px solid #a0896b;}
/* Sidebar active */
.sb-active{background:#ede6d6;color:#2c2825!important;}
/* Project tab active */
.ptab-active{border-bottom:2px solid #a0896b;color:#a0896b;}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     NOTIFICATION TOASTS
══════════════════════════════════════════ -->
<div id="toast-container" style="position:fixed;top:calc(1rem + env(safe-area-inset-top));right:1rem;z-index:200;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;"></div>

<!-- ══════════════════════════════════════════
     MODAL (shared, dynamic content)
══════════════════════════════════════════ -->
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-box scale-in" id="modal-box"></div>
</div>

<!-- ══════════════════════════════════════════
     FULLSCREEN OVERLAYS
══════════════════════════════════════════ -->
<!-- Note Focus Mode -->
<div id="fs-notes" class="fs-overlay hidden">
  <div style="background:#f5f0e8;border-bottom:1px solid #ede6d6;padding:.85rem 1.1rem;display:flex;align-items:center;gap:.75rem;padding-top:calc(.85rem + env(safe-area-inset-top));">
    <button onclick="closeFS('fs-notes')" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#8c8480;">←</button>
    <span id="fs-notes-title" style="font-weight:600;font-size:1rem;color:#2c2825;flex:1;"></span>
    <button onclick="openNoteEditor(null)" class="btn-wood" style="padding:.4rem .85rem;font-size:.8rem;">+ Note</button>
  </div>
  <div id="fs-notes-list" style="flex:1;overflow-y:auto;padding:1rem;"></div>
</div>

<!-- Note Editor -->
<div id="fs-editor" class="fs-overlay hidden">
  <div style="background:#f5f0e8;border-bottom:1px solid #ede6d6;padding:.85rem 1.1rem;display:flex;align-items:center;gap:.75rem;padding-top:calc(.85rem + env(safe-area-inset-top));">
    <button onclick="closeFS('fs-editor')" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#8c8480;">←</button>
    <input id="editor-title" class="inp" style="flex:1;font-weight:600;" placeholder="Note title…"/>
    <button onclick="saveNote()" class="btn-wood" style="padding:.4rem .85rem;font-size:.8rem;">Save</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:1.25rem 1.5rem;">
    <textarea id="editor-area" class="inp" style="width:100%;min-height:calc(100vh - 120px);border:none;padding:0;font-size:1rem;line-height:1.85;resize:none;background:transparent;" placeholder="Start writing…"></textarea>
  </div>
</div>

<!-- Project Workspace -->
<div id="fs-project" class="fs-overlay hidden">
  <div style="background:#f5f0e8;border-bottom:1px solid #ede6d6;padding:.85rem 1.25rem;display:flex;align-items:center;gap:.75rem;padding-top:calc(.85rem + env(safe-area-inset-top));">
    <button onclick="closeFS('fs-project')" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#8c8480;">←</button>
    <div style="flex:1;">
      <div id="fs-proj-name" style="font-weight:700;font-size:1.05rem;color:#2c2825;"></div>
      <div id="fs-proj-desc" style="font-size:.75rem;color:#8c8480;"></div>
    </div>
  </div>
  <!-- Project Tabs -->
  <div style="display:flex;border-bottom:1px solid #ede6d6;background:#f5f0e8;">
    <button class="ptab-active" id="ptab-tasks" onclick="switchPTab('tasks')" style="flex:1;padding:.7rem;font-size:.82rem;background:none;border:none;cursor:pointer;border-bottom:2px solid #a0896b;color:#a0896b;font-weight:500;">Tasks</button>
    <button id="ptab-notes" onclick="switchPTab('notes')" style="flex:1;padding:.7rem;font-size:.82rem;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;color:#8c8480;font-weight:500;">Meeting Notes</button>
    <button id="ptab-brief" onclick="switchPTab('brief')" style="flex:1;padding:.7rem;font-size:.82rem;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;color:#8c8480;font-weight:500;">Brief</button>
  </div>
  <!-- Tab panels -->
  <div id="ptab-panel-tasks" style="flex:1;overflow-y:auto;padding:1rem;"></div>
  <div id="ptab-panel-notes" style="flex:1;overflow-y:auto;padding:1rem;display:none;"></div>
  <div id="ptab-panel-brief" style="flex:1;overflow-y:auto;padding:1rem;display:none;"></div>
</div>

<!-- ══════════════════════════════════════════
     MAIN LAYOUT
══════════════════════════════════════════ -->
<div style="display:flex;height:100dvh;overflow:hidden;">

  <!-- SIDEBAR (desktop) -->
  <aside id="sidebar" class="hidden lg:flex" style="flex-direction:column;background:#ede6d6;border-right:1px solid #d9d0c4;padding:1.5rem .85rem;gap:.3rem;flex-shrink:0;overflow-y:auto;padding-top:calc(1.5rem + env(safe-area-inset-top));">
    <div style="padding:.5rem .75rem 1.25rem;font-weight:700;font-size:1.05rem;color:#2c2825;letter-spacing:.02em;">✦ Personal OS</div>
    <button onclick="setPage('tasks')" id="sb-tasks" class="sb-active" style="display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:.65rem;border:none;cursor:pointer;font-size:.875rem;color:#5a5248;text-align:left;width:100%;transition:all .15s;">
      <span>☑</span> Task Manager
    </button>
    <button onclick="setPage('notes')" id="sb-notes" style="display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:.65rem;border:none;cursor:pointer;font-size:.875rem;color:#5a5248;text-align:left;width:100%;transition:all .15s;background:transparent;">
      <span>📓</span> Knowledge Base
    </button>
    <button onclick="setPage('projects')" id="sb-projects" style="display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:.65rem;border:none;cursor:pointer;font-size:.875rem;color:#5a5248;text-align:left;width:100%;transition:all .15s;background:transparent;">
      <span>◈</span> Projects
    </button>
    <div style="margin-top:auto;padding:.75rem;border-top:1px solid #d9d0c4;">
      <div style="font-size:.72rem;color:#b8b0a8;">Personal OS v1.0</div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

    <!-- Mobile header -->
    <div class="lg:hidden" style="background:#f5f0e8;border-bottom:1px solid #ede6d6;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;padding-top:calc(.85rem + env(safe-area-inset-top));flex-shrink:0;">
      <span style="font-weight:700;font-size:1rem;color:#2c2825;">✦ Personal OS</span>
      <span id="mobile-page-label" style="font-size:.8rem;color:#8c8480;">Task Manager</span>
    </div>

    <!-- Pages -->
    <div style="flex:1;overflow:hidden;position:relative;">

      <!-- ── TASKS PAGE ── -->
      <div id="page-tasks" style="position:absolute;inset:0;overflow-y:auto;padding:1.25rem;" class="slide-up">
        <div style="max-width:720px;margin:0 auto;">
          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <div>
              <h1 style="font-size:1.3rem;font-weight:700;color:#2c2825;">Task Manager</h1>
              <p style="font-size:.78rem;color:#8c8480;" id="task-date"></p>
            </div>
            <div style="display:flex;gap:.5rem;">
              <button onclick="openModal('folder-task')" class="btn-ghost" style="font-size:.8rem;padding:.45rem .8rem;">+ Folder</button>
              <button onclick="openModal('add-task')" class="btn-wood" style="font-size:.8rem;padding:.45rem .85rem;">+ Task</button>
            </div>
          </div>
          <!-- Folder filter tabs -->
          <div id="task-folder-tabs" style="display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem;scrollbar-width:none;"></div>
          <!-- Active tasks -->
          <div id="task-list" style="display:flex;flex-direction:column;gap:.6rem;"></div>
          <!-- Done section -->
          <div id="done-section" style="margin-top:1.5rem;"></div>
        </div>
      </div>

      <!-- ── NOTES PAGE ── -->
      <div id="page-notes" style="position:absolute;inset:0;overflow-y:auto;padding:1.25rem;display:none;">
        <div style="max-width:720px;margin:0 auto;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <div>
              <h1 style="font-size:1.3rem;font-weight:700;color:#2c2825;">Knowledge Base</h1>
              <p style="font-size:.78rem;color:#8c8480;">Your personal library</p>
            </div>
            <button onclick="openModal('folder-note')" class="btn-wood" style="font-size:.8rem;padding:.45rem .85rem;">+ Folder</button>
          </div>
          <div id="note-folders-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;"></div>
        </div>
      </div>

      <!-- ── PROJECTS PAGE ── -->
      <div id="page-projects" style="position:absolute;inset:0;overflow-y:auto;padding:1.25rem;display:none;">
        <div style="max-width:720px;margin:0 auto;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <div>
              <h1 style="font-size:1.3rem;font-weight:700;color:#2c2825;">Projects</h1>
              <p style="font-size:.78rem;color:#8c8480;">Command center</p>
            </div>
            <button onclick="openModal('add-project')" class="btn-wood" style="font-size:.8rem;padding:.45rem .85rem;">+ Project</button>
          </div>
          <div id="project-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;"></div>
        </div>
      </div>

    </div><!-- /pages -->

    <!-- BOTTOM NAV (mobile) -->
    <nav id="bottom-nav" class="lg:hidden" style="background:#f5f0e8;border-top:1px solid #ede6d6;display:flex;align-items:center;justify-content:space-around;padding:.65rem 0;flex-shrink:0;">
      <button onclick="setPage('tasks')" id="bn-tasks" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:#a0896b;font-size:.65rem;font-weight:500;">
        <span style="font-size:1.2rem;">☑</span> Tasks
        <div class="nav-dot" style="width:4px;height:4px;border-radius:50%;background:#a0896b;opacity:1;margin-top:1px;"></div>
      </button>
      <button onclick="setPage('notes')" id="bn-notes" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:#8c8480;font-size:.65rem;font-weight:500;">
        <span style="font-size:1.2rem;">📓</span> Notes
        <div class="nav-dot" style="width:4px;height:4px;border-radius:50%;background:#a0896b;opacity:0;margin-top:1px;"></div>
      </button>
      <button onclick="setPage('projects')" id="bn-projects" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:#8c8480;font-size:.65rem;font-weight:500;">
        <span style="font-size:1.2rem;">◈</span> Projects
        <div class="nav-dot" style="width:4px;height:4px;border-radius:50%;background:#a0896b;opacity:0;margin-top:1px;"></div>
      </button>
    </nav>

  </div><!-- /main content -->
</div><!-- /layout -->

<script>
// ══════════════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════════════
const DB = {
  get(k){ try{ return JSON.parse(localStorage.getItem('pos_'+k)||'null'); }catch(e){ return null; }},
  set(k,v){ localStorage.setItem('pos_'+k,JSON.stringify(v)); },
  def(k,d){ if(this.get(k)===null) this.set(k,d); return this.get(k); }
};

// Init default data
let taskFolders  = DB.def('taskFolders',  []);
let tasks        = DB.def('tasks',        []);
let noteFolders  = DB.def('noteFolders',  []);
let notes        = DB.def('notes',        []);
let projects     = DB.def('projects',     []);

function save(){
  DB.set('taskFolders', taskFolders);
  DB.set('tasks',       tasks);
  DB.set('noteFolders', noteFolders);
  DB.set('notes',       notes);
  DB.set('projects',    projects);
}

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
let currentPage = 'tasks';
const pageLabels = { tasks:'Task Manager', notes:'Knowledge Base', projects:'Projects' };

function setPage(p){
  currentPage = p;
  ['tasks','notes','projects'].forEach(id=>{
    document.getElementById('page-'+id).style.display = id===p ? 'block' : 'none';
    // sidebar
    const sb = document.getElementById('sb-'+id);
    if(sb){ sb.className = id===p ? 'sb-active' : ''; sb.style.background = id===p ? '' : 'transparent'; }
    // bottom nav
    const bn = document.getElementById('bn-'+id);
    if(bn){
      bn.style.color = id===p ? '#a0896b' : '#8c8480';
      bn.querySelector('.nav-dot').style.opacity = id===p ? '1' : '0';
    }
  });
  document.getElementById('mobile-page-label').textContent = pageLabels[p];
  if(p==='tasks') renderTasks();
  if(p==='notes') renderNoteFolders();
  if(p==='projects') renderProjects();
}

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
let modalType='';
function openModal(type, data={}){
  modalType=type;
  const box = document.getElementById('modal-box');
  box.innerHTML = buildModal(type, data);
  box.className = 'modal-box scale-in';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}

function buildModal(type, data){
  const folders = taskFolders.map(f=>`<option value="${f.id}" ${data.folderId===f.id?'selected':''}>${esc(f.name)}</option>`).join('');
  const nFolders = noteFolders.map(f=>`<option value="${f.id}" ${data.folderId===f.id?'selected':''}>${esc(f.name)}</option>`).join('');

  if(type==='folder-task') return `
    <h2 style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:#2c2825;">New Task Folder</h2>
    <input class="inp" id="m-fname" placeholder="Folder name (e.g. Master's Degree)" style="margin-bottom:1rem;"/>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-wood" onclick="addTaskFolder()">Create</button>
    </div>`;

  if(type==='add-task') return `
    <h2 style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:#2c2825;">${data.id?'Edit Task':'New Task'}</h2>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input class="inp" id="m-ttitle" placeholder="Task title…" value="${esc(data.title||'')}"/>
      <select class="inp" id="m-tpriority">
        <option value="high" ${data.priority==='high'?'selected':''}>🔴 High Priority</option>
        <option value="med" ${(!data.priority||data.priority==='med')?'selected':''}>🟡 Medium Priority</option>
        <option value="low" ${data.priority==='low'?'selected':''}>🟢 Low Priority</option>
      </select>
      <input class="inp" id="m-tdeadline" type="datetime-local" value="${data.deadline||''}"/>
      <select class="inp" id="m-tfolder">
        <option value="">No folder</option>${folders}
      </select>
      <div style="display:flex;gap:.6rem;justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-wood" onclick="saveTask('${data.id||''}')">${data.id?'Save':'Add Task'}</button>
      </div>
    </div>`;

  if(type==='folder-note') return `
    <h2 style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:#2c2825;">New Note Folder</h2>
    <input class="inp" id="m-nfname" placeholder="Folder name (e.g. Book Summaries)"/>
    <div style="margin-top:.75rem;display:flex;gap:.6rem;justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-wood" onclick="addNoteFolder()">Create</button>
    </div>`;

  if(type==='add-project') return `
    <h2 style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:#2c2825;">${data.id?'Edit Project':'New Project'}</h2>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input class="inp" id="m-pname" placeholder="Project name…" value="${esc(data.name||'')}"/>
      <input class="inp" id="m-pdesc" placeholder="Short description…" value="${esc(data.description||'')}"/>
      <select class="inp" id="m-pstatus">
        <option value="active" ${(!data.status||data.status==='active')?'selected':''}>⚡ Active</option>
        <option value="planning" ${data.status==='planning'?'selected':''}>📋 Planning</option>
        <option value="done" ${data.status==='done'?'selected':''}>✅ Done</option>
      </select>
      <div style="display:flex;gap:.6rem;justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-wood" onclick="saveProject('${data.id||''}')">${data.id?'Save':'Create'}</button>
      </div>
    </div>`;

  if(type==='add-project-task') return `
    <h2 style="font-weight:700;font-size:1rem;margin-bottom:1rem;color:#2c2825;">New Project Task</h2>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input class="inp" id="m-pttitle" placeholder="Task…"/>
      <div style="display:flex;gap:.6rem;justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-wood" onclick="addProjectTask('${data.projectId}')">Add</button>

    </div>`;

  return '';
}

// UTILITIES
// ══════════════════════════════════════════════════
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }

// Toast
function toast(msg, color='#a0896b'){
  const el=document.createElement('div');
  el.className='n-toast';
  el.style.borderLeftColor=color;
  el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),5000);
}

// TASK MANAGER
// ══════════════════════════════════════════════════
let activeTaskFolder = '';

function addTaskFolder(){
  const n = document.getElementById('m-fname').value.trim();
  if(!n) return;
  taskFolders.push({id:uid(), name:n});
  save(); closeModal(); renderTasks();
}

function saveTask(editId){
  const title = document.getElementById('m-ttitle').value.trim();
  if(!title) return;
  const priority = document.getElementById('m-tpriority').value;
  const deadline = document.getElementById('m-tdeadline').value;
  const folderId = document.getElementById('m-tfolder').value;
  if(editId){
    const t = tasks.find(x=>x.id===editId);
    if(t){ Object.assign(t,{title,priority,deadline,folderId}); }
  } else {
    tasks.push({id:uid(),title,priority,deadline,folderId,done:false,createdAt:new Date().toISOString()});
  }
  save(); closeModal(); renderTasks();
  if(deadline) scheduleNotification(deadline, title);
}

function toggleTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = !t.done;
  t.completedAt = t.done ? new Date().toISOString() : null;
  save(); renderTasks();
}

function deleteTask(id){
  tasks = tasks.filter(x=>x.id!==id);
  save(); renderTasks();
}

function renderTasks(){
  // Date header
  document.getElementById('task-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  // Folder tabs
  const tabs = document.getElementById('task-folder-tabs');
  tabs.innerHTML = `
    <button onclick="setTaskFolder('')" style="white-space:nowrap;padding:.35rem .85rem;border-radius:99px;border:1.5px solid ${activeTaskFolder===''?'#a0896b':'#d9d0c4'};background:${activeTaskFolder===''?'#a0896b':'transparent'};color:${activeTaskFolder===''?'#faf7f2':'#5a5248'};font-size:.78rem;cursor:pointer;">All</button>
    ${taskFolders.map(f=>`
      <button onclick="setTaskFolder('${f.id}')" style="white-space:nowrap;padding:.35rem .85rem;border-radius:99px;border:1.5px solid ${activeTaskFolder===f.id?'#a0896b':'#d9d0c4'};background:${activeTaskFolder===f.id?'#a0896b':'transparent'};color:${activeTaskFolder===f.id?'#faf7f2':'#5a5248'};font-size:.78rem;cursor:pointer;">${esc(f.name)}</button>
    `).join('')}`;

  // Filter tasks
  let visible = activeTaskFolder ? tasks.filter(t=>t.folderId===activeTaskFolder) : tasks;
  const active = visible.filter(t=>!t.done).sort((a,b)=>{
    const po={high:0,med:1,low:2}; return po[a.priority]-po[b.priority];
  });
  const done = visible.filter(t=>t.done);

  // Active tasks
  const list = document.getElementById('task-list');
  if(active.length===0){
    list.innerHTML=`<div style="text-align:center;padding:2.5rem 1rem;color:#b8b0a8;font-size:.875rem;">No active tasks — well done ✦</div>`;
  } else {
    list.innerHTML = active.map(t => taskCard(t)).join('');
  }

  // Done section
  const ds = document.getElementById('done-section');
  if(done.length===0){ ds.innerHTML=''; return; }
  ds.innerHTML = `
    <div style="font-size:.78rem;font-weight:600;color:#8c8480;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.65rem;">Completed (${done.length})</div>
    <div style="display:flex;flex-direction:column;gap:.5rem;opacity:.7;">
      ${done.map(t=>taskCard(t)).join('')}
    </div>`;
}

function taskCard(t){
  const pClass = {high:'tag-high',med:'tag-med',low:'tag-low'}[t.priority]||'tag-med';
  const pLabel = {high:'High',med:'Med',low:'Low'}[t.priority]||'Med';
  const isOverdue = t.deadline && !t.done && new Date(t.deadline)<new Date();
  const folder = taskFolders.find(f=>f.id===t.folderId);
  return `
    <div style="background:#faf7f2;border:1px solid #ede6d6;border-radius:.9rem;padding:.85rem 1rem;display:flex;align-items:flex-start;gap:.75rem;${isOverdue?'border-left:3px solid #b5714a;':''}" class="fade-in">
      <div class="cb ${t.done?'checked':''}" onclick="toggleTask('${t.id}')" style="margin-top:.1rem;">
        ${t.done?'<svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.9rem;font-weight:500;color:${t.done?'#b8b0a8':'#2c2825'};${t.done?'text-decoration:line-through;':''};word-break:break-word;">${esc(t.title)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;align-items:center;">
          <span class="${pClass}" style="font-size:.7rem;padding:.15rem .5rem;border-radius:99px;">${pLabel}</span>
          ${folder?`<span style="font-size:.7rem;color:#8c8480;background:#ede6d6;padding:.15rem .5rem;border-radius:99px;">${esc(folder.name)}</span>`:''}
          ${t.deadline?`<span style="font-size:.7rem;color:${isOverdue?'#b5714a':'#8c8480'};">${isOverdue?'⚠ ':''}${fmtDate(t.deadline)}</span>`:''}
          ${t.done&&t.completedAt?`<span style="font-size:.7rem;color:#8c8480;">Done at ${fmtTime(t.completedAt)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:.25rem;flex-shrink:0;">
        ${!t.done?`<button onclick="openModal('add-task',${JSON.stringify(t).replace(/"/g,'&quot;')})" style="background:none;border:none;cursor:pointer;font-size:.85rem;color:#b8b0a8;padding:.15rem .3rem;" title="Edit">✏</button>`:''}
        <button onclick="deleteTask('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:.85rem;color:#b8b0a8;padding:.15rem .3rem;" title="Delete">✕</button>
      </div>
    </div>`;
}

function setTaskFolder(id){
  activeTaskFolder = id;
  renderTasks();
}

// ══════════════════════════════════════════════════
// NOTIFICATIONS / DEADLINE SCHEDULER
// ══════════════════════════════════════════════════
const scheduledNotifs = new Set();

function scheduleNotification(deadlineIso, title){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') Notification.requestPermission();
  const key = deadlineIso+'|'+title;
  if(scheduledNotifs.has(key)) return;
  scheduledNotifs.add(key);
  const ms = new Date(deadlineIso).getTime() - Date.now();
  if(ms<=0){
    fireNotif(title, deadlineIso); return;
  }
  // 1 hour before
  const ms1h = ms - 3600000;
  if(ms1h>0) setTimeout(()=>fireNotif(title, deadlineIso, '1 hour'), ms1h);
  // At deadline
  setTimeout(()=>fireNotif(title, deadlineIso), ms);
}

function fireNotif(title, deadlineIso, when=''){
  const msg = when ? `⏰ "${title}" is due in ${when}!` : `🔔 Task due now: "${title}"`;
  toast(msg, '#b5714a');
  if(Notification.permission==='granted'){
    try{ new Notification('Personal OS', {body:msg, icon:''}); }catch(e){}
  }
}

function initNotifications(){
  if(Notification.permission==='default') Notification.requestPermission();
  tasks.filter(t=>!t.done&&t.deadline).forEach(t=>{
    const ms = new Date(t.deadline).getTime()-Date.now();
    if(ms>0) scheduleNotification(t.deadline, t.title);
    else if(ms>-86400000) toast(`⚠ Overdue: "${t.title}"`, '#b5714a');
  });
}

let currentNoteFolder = null;
let currentNoteId = null;

function addNoteFolder(){
  const n = document.getElementById('m-nfname').value.trim();
  if(!n) return;
  noteFolders.push({id:uid(),name:n,icon:'📁',createdAt:new Date().toISOString()});
  save(); closeModal(); renderNoteFolders();
}

function deleteNoteFolder(id){
  noteFolders = noteFolders.filter(f=>f.id!==id);
  notes = notes.filter(n=>n.folderId!==id);
  save(); renderNoteFolders();
}

function renderNoteFolders(){
  const grid = document.getElementById('note-folders-grid');
  if(noteFolders.length===0){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem 1rem;color:#b8b0a8;font-size:.875rem;">No folders yet — create one to get started ✦</div>`;
    return;
  }
  grid.innerHTML = noteFolders.map(f=>{
    const count = notes.filter(n=>n.folderId===f.id).length;
    return `
      <div class="folder-card" style="background:#faf7f2;border:1px solid #ede6d6;border-radius:1rem;padding:1.25rem;cursor:pointer;" onclick="openNoteFolder('${f.id}')">
        <div style="font-size:1.75rem;margin-bottom:.6rem;">📁</div>
        <div style="font-weight:600;font-size:.9rem;color:#2c2825;margin-bottom:.25rem;">${esc(f.name)}</div>
        <div style="font-size:.75rem;color:#8c8480;">${count} note${count!==1?'s':''}</div>
        <div style="margin-top:.85rem;display:flex;justify-content:flex-end;">
          <button onclick="event.stopPropagation();deleteNoteFolder('${f.id}')" style="background:none;border:none;cursor:pointer;font-size:.78rem;color:#c4a882;">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function openNoteFolder(folderId){
  currentNoteFolder = folderId;
  const folder = noteFolders.find(f=>f.id===folderId);
  document.getElementById('fs-notes-title').textContent = folder.name;
  renderNotesList();
  openFS('fs-notes');
}

function renderNotesList(){
  const list = document.getElementById('fs-notes-list');
  const folderNotes = notes.filter(n=>n.folderId===currentNoteFolder);
  if(folderNotes.length===0){
    list.innerHTML=`<div style="text-align:center;padding:3rem 1rem;color:#b8b0a8;font-size:.875rem;">No notes yet — tap "+ Note" to begin</div>`;
    return;
  }
  list.innerHTML = folderNotes.map(n=>`
    <div style="background:#faf7f2;border:1px solid #ede6d6;border-radius:.9rem;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;cursor:pointer;" onclick="openNoteEditor('${n.id}')">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:500;font-size:.9rem;color:#2c2825;">${esc(n.title)||'Untitled'}</div>
        <div style="font-size:.75rem;color:#8c8480;margin-top:.2rem;">${new Date(n.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        <div style="font-size:.78rem;color:#b8b0a8;margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc((n.body||'').slice(0,80))}</div>
      </div>
      <button onclick="event.stopPropagation();deleteNote('${n.id}')" style="background:none;border:none;cursor:pointer;color:#c4a882;font-size:.85rem;flex-shrink:0;">✕</button>
    </div>`).join('');
}

function openNoteEditor(noteId){
  currentNoteId = noteId;
  const note = noteId ? notes.find(n=>n.id===noteId) : null;
  document.getElementById('editor-title').value = note ? note.title : '';
  document.getElementById('editor-area').value = note ? note.body : '';
  openFS('fs-editor');
}

function saveNote(){
  const title = document.getElementById('editor-title').value.trim()||'Untitled';
  const body  = document.getElementById('editor-area').value;
  if(currentNoteId){
    const n = notes.find(x=>x.id===currentNoteId);
    if(n){ n.title=title; n.body=body; n.updatedAt=new Date().toISOString(); }
  } else {
    notes.push({id:uid(),folderId:currentNoteFolder,title,body,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  }
  save();
  closeFS('fs-editor');
  renderNotesList();
  toast('Note saved ✦');
}

function deleteNote(id){
  notes = notes.filter(n=>n.id!==id);
  save(); renderNotesList();
}

let currentProjectId = null;
let currentPTab = 'tasks';

function saveProject(editId){
  const name  = document.getElementById('m-pname').value.trim();
  if(!name) return;
  const description = document.getElementById('m-pdesc').value.trim();
  const status      = document.getElementById('m-pstatus').value;
  if(editId){
    const p = projects.find(x=>x.id===editId);
    if(p) Object.assign(p,{name,description,status});
  } else {
    projects.push({
      id:uid(),name,description,status,
      tasks:[],meetingNotes:'',brief:'',
      createdAt:new Date().toISOString()
    });
  }
  save(); closeModal(); renderProjects();
}

function deleteProject(id){
  projects = projects.filter(p=>p.id!==id);
  save(); renderProjects();
}

function renderProjects(){
  const grid = document.getElementById('project-grid');
  if(projects.length===0){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem 1rem;color:#b8b0a8;font-size:.875rem;">No projects yet — create your first one ✦</div>`;
    return;
  }
  const statusStyle={active:'background:#eef5e8;color:#6b7c5c;',planning:'background:#eef0f8;color:#5a6080;',done:'background:#f0f0ec;color:#7d7a72;'};
  const statusLabel={active:'⚡ Active',planning:'📋 Planning',done:'✅ Done'};
  grid.innerHTML = projects.map(p=>{
    const done = (p.tasks||[]).filter(t=>t.done).length;
    const total= (p.tasks||[]).length;
    const pct  = total ? Math.round(done/total*100) : 0;
    return `
      <div class="folder-card" style="background:#faf7f2;border:1px solid #ede6d6;border-radius:1.1rem;padding:1.25rem;cursor:pointer;" onclick="openProjectWorkspace('${p.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.65rem;">
          <div style="font-size:1.6rem;">◈</div>
          <span style="font-size:.7rem;padding:.2rem .6rem;border-radius:99px;${statusStyle[p.status]||statusStyle.active}">${statusLabel[p.status]||statusLabel.active}</span>
        </div>
        <div style="font-weight:700;font-size:.95rem;color:#2c2825;margin-bottom:.2rem;">${esc(p.name)}</div>
        <div style="font-size:.78rem;color:#8c8480;margin-bottom:.85rem;">${esc(p.description)}</div>
        ${total?`
        <div style="margin-bottom:.4rem;">
          <div style="height:4px;background:#ede6d6;border-radius:99px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:#a0896b;border-radius:99px;transition:width .3s;"></div>
          </div>
          <div style="font-size:.7rem;color:#b8b0a8;margin-top:.25rem;">${done}/${total} tasks</div>
        </div>`:''}
        <div style="display:flex;justify-content:flex-end;gap:.4rem;">
          <button onclick="event.stopPropagation();openModal('add-project',${JSON.stringify(p).replace(/"/g,'&quot;')})" style="background:none;border:none;cursor:pointer;font-size:.78rem;color:#c4a882;">Edit</button>
          <button onclick="event.stopPropagation();deleteProject('${p.id}')" style="background:none;border:none;cursor:pointer;font-size:.78rem;color:#c4a882;">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function openProjectWorkspace(id){
  currentProjectId = id;
  const p = projects.find(x=>x.id===id);
  document.getElementById('fs-proj-name').textContent = p.name;
  document.getElementById('fs-proj-desc').textContent = p.description||'';
  switchPTab('tasks');
  openFS('fs-project');
}

function switchPTab(tab){
  currentPTab = tab;
  ['tasks','notes','brief'].forEach(t=>{
    const btn = document.getElementById('ptab-'+t);
    const panel = document.getElementById('ptab-panel-'+t);
    if(t===tab){
      btn.className='ptab-active';
      btn.style.borderBottom='2px solid #a0896b';
      btn.style.color='#a0896b';
      panel.style.display='block';
    } else {
      btn.className='';
      btn.style.borderBottom='2px solid transparent';
      btn.style.color='#8c8480';
      panel.style.display='none';
    }
  });
  renderProjectTab(tab);
}

function renderProjectTab(tab){
  const p = projects.find(x=>x.id===currentProjectId);
  if(!p) return;

  if(tab==='tasks'){
    const panel = document.getElementById('ptab-panel-tasks');
    const active = (p.tasks||[]).filter(t=>!t.done);
    const done   = (p.tasks||[]).filter(t=>t.done);
    panel.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
        <button class="btn-wood" style="font-size:.8rem;padding:.4rem .85rem;" onclick="openModal('add-project-task',{projectId:'${p.id}'})">+ Task</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:.5rem;">
        ${active.map(t=>projTaskRow(t,p.id)).join('')}
        ${done.length?`<div style="margin-top:.75rem;font-size:.75rem;color:#8c8480;text-transform:uppercase;letter-spacing:.06em;font-weight:600;">Done</div>${done.map(t=>projTaskRow(t,p.id)).join('')}`:''}
      </div>
      ${active.length===0&&done.length===0?`<div style="text-align:center;padding:2.5rem;color:#b8b0a8;font-size:.875rem;">No tasks yet ✦</div>`:''}
    `;
  }

  if(tab==='notes'){
    const panel = document.getElementById('ptab-panel-notes');
    panel.innerHTML=`
      <div style="font-size:.8rem;color:#8c8480;margin-bottom:.75rem;">Meeting notes & transcripts</div>
      <textarea style="width:100%;min-height:60vh;border:1.5px solid #ede6d6;border-radius:.9rem;padding:1rem;background:#faf7f2;font-size:.9rem;line-height:1.8;resize:none;outline:none;color:#2c2825;" placeholder="Paste meeting notes, transcripts, decisions…" oninput="saveProjField('meetingNotes',this.value)">${esc(p.meetingNotes||'')}</textarea>
    `;
  }

  if(tab==='brief'){
    const panel = document.getElementById('ptab-panel-brief');
    panel.innerHTML=`
      <div style="font-size:.8rem;color:#8c8480;margin-bottom:.75rem;">Project goals, resources & context</div>
      <textarea style="width:100%;min-height:60vh;border:1.5px solid #ede6d6;border-radius:.9rem;padding:1rem;background:#faf7f2;font-size:.9rem;line-height:1.8;resize:none;outline:none;color:#2c2825;" placeholder="Define goals, success metrics, links, stakeholders…" oninput="saveProjField('brief',this.value)">${esc(p.brief||'')}</textarea>
    `;
  }
}

function projTaskRow(t, projId){
  return `
    <div style="display:flex;align-items:center;gap:.65rem;padding:.7rem .9rem;background:#faf7f2;border:1px solid #ede6d6;border-radius:.75rem;${t.done?'opacity:.55;':''}" class="fade-in">
      <div class="cb ${t.done?'checked':''}" onclick="toggleProjectTask('${projId}','${t.id}')">
        ${t.done?'<svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}
      </div>
      <span style="flex:1;font-size:.875rem;color:#2c2825;${t.done?'text-decoration:line-through;color:#b8b0a8;':''}">${esc(t.title)}</span>
      <button onclick="deleteProjectTask('${projId}','${t.id}')" style="background:none;border:none;cursor:pointer;color:#c4a882;font-size:.85rem;">✕</button>
    </div>`;
}

function addProjectTask(projId){
  const title = document.getElementById('m-pttitle').value.trim();
  if(!title) return;
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  if(!p.tasks) p.tasks=[];
  p.tasks.push({id:uid(),title,done:false,createdAt:new Date().toISOString()});
  save(); closeModal(); renderProjectTab('tasks');
}

function toggleProjectTask(projId, taskId){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  const t = p.tasks.find(x=>x.id===taskId);
  if(t){ t.done=!t.done; t.completedAt=t.done?new Date().toISOString():null; }
  save(); renderProjectTab('tasks'); renderProjects();
}

function deleteProjectTask(projId, taskId){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  p.tasks = p.tasks.filter(x=>x.id!==taskId);
  save(); renderProjectTab('tasks'); renderProjects();
}

function saveProjField(field, value){
  const p = projects.find(x=>x.id===currentProjectId);
  if(p){ p[field]=value; save(); }
}

function openFS(id){
  document.getElementById(id).classList.remove('hidden');
  document.getElementById(id).classList.add('slide-up');
}
function closeFS(id){
  document.getElementById(id).classList.add('hidden');
}
